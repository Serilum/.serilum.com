<!DOCTYPE HTML>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<meta name="identifier-url" content="https://serilum.com/" />
	<meta name="description" content="Serilum makes Minecraft mods on CurseForge and Modrinth. Here you'll find an overview, changelogs and more information on them." />
	<meta name="keywords" content="serilum, minecraft, mods, overview, curseforge, modrinth" />
	<meta name="author" content="Rick South" />
	<link rel="shortcut icon" href="/assets/images/favicon.ico" type="image/x-icon">
	<title>Serilum.com | Mods</title>
	<link rel="stylesheet" href="/assets/css/global.css">
	<link rel="stylesheet" href="/assets/css/mods.css">
</head>
<body class="defaultcurseforge">
	<div class="main">
		<div class="navigation noselect">
			<div class="inside">
				<div class="serilum" hidden>
					<a href="/"><img alt="serilum" src="/assets/images/serilum.png"></a>
				</div>
				<ul>
					<li><a href="/">Home</a></li>
					<li><a href="/about">About</a></li>
					<li><a class="selected" href="/mods">Mods</a></li>
					<li><a href="/donate">Donate</a></li>
					<li><a class="external" href="https://github.com/Serilum" target=_blank>Github</a></li>
					<li class="togglewrapper">
						<img alt="modrinth" class="modrinth" src="/assets/images/modrinth_tiny.png">
						<div class="toggle checkcross">
							<input id="checkcross" type="checkbox" checked>
							<label class="toggle-item" for="checkcross">
								<div class="check"></div>
							</label>
						</div>
						<img alt="curseforge" class="curseforge" src="/assets/images/curseforge_tiny.png">
					</li>
				</ul>
			</div>
		</div>
		<div class="submenuwrapper noselect">
			<a class="submenubtn" href="/mods/changelog">Global Changelog</a>
			<a class="submenubtn" href="/mods/requests">Feature Requests</a>
		</div>
		<div class="modwrapper" hidden>
			<div class="modcontrols">
				<input id="modsearch" type="text" placeholder="Search mods" autocomplete="off">
				<div class="versionfilter noselect"></div>
				<p class="modcount"></p>
			</div>
			<div class="modgrid noselect"></div>
			<p class="noresults" hidden>No mods match your search.</p>
		</div>
		<div class="changelogwrapper" hidden>
			<div class="insidechangelog">
				<div class="closewrapper">
					<p>×</p>
				</div>
				<div class="changelogcontent"></div>
			</div>
		</div>
		<div class="versionchoice" hidden>
			<div class="insidechoice">
				<p class="choicetitle">Version <span class="choiceversion"></span> has a separate Fabric page.</p>
				<div class="choicebtns">
					<a class="choicebtn" id="choiceforge" target=_blank>Forge</a>
					<a class="choicebtn" id="choicefabric" target=_blank>Fabric</a>
				</div>
			</div>
		</div>
		<div class="toasterwrapper"></div>
	</div>
	<div class="footer">
		<div class="insidefooter" hidden>
			<p><a href="/donate" target=_blank>❤️ Thank you to <span class="randommember"></span> for sponsoring me on <span class="randomplatform"></span>! ❤️</a></p>
		</div>
	</div>
	<span class=".preloadimages">
		<link rel="preload" as="image" href="/assets/images/changelog.png" />
		<link rel="preload" as="image" href="/assets/data/logo/collective.png" />
	</span>
</body>
	<script type="text/javascript" src="/assets/external/js/jquery-3.2.1.min.js"></script>
	<script type="text/javascript" src="/assets/external/js/js-cookie.js"></script>
	<script type="text/javascript" src="/assets/js/global.js"></script>
	<script type="text/javascript" src="/assets/js/mods.js"></script>
</html>
